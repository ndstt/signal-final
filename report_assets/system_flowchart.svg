<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <style>
      .box { fill: #eef4ff; stroke: #2f4b7c; stroke-width: 2; rx: 12; ry: 12; }
      .title { font: 700 20px Arial, sans-serif; fill: #1f2a44; }
      .text { font: 16px Arial, sans-serif; fill: #1f2a44; }
      .arrow { stroke: #355070; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#355070" />
    </marker>
  </defs>

  <rect x="30" y="120" width="150" height="70" class="box" />
  <text x="105" y="148" text-anchor="middle" class="title">Input WAV</text>
  <text x="105" y="172" text-anchor="middle" class="text">audio_04_group1.wav</text>

  <rect x="220" y="120" width="170" height="70" class="box" />
  <text x="305" y="148" text-anchor="middle" class="title">Preprocess</text>
  <text x="305" y="172" text-anchor="middle" class="text">Read, mono, normalize</text>

  <rect x="430" y="35" width="170" height="70" class="box" />
  <text x="515" y="63" text-anchor="middle" class="title">FFT Analysis</text>
  <text x="515" y="87" text-anchor="middle" class="text">Find narrow peaks</text>

  <rect x="430" y="205" width="170" height="70" class="box" />
  <text x="515" y="233" text-anchor="middle" class="title">STFT Analysis</text>
  <text x="515" y="257" text-anchor="middle" class="text">Locate time intervals</text>

  <rect x="650" y="120" width="190" height="70" class="box" />
  <text x="745" y="148" text-anchor="middle" class="title">Noise Estimation</text>
  <text x="745" y="172" text-anchor="middle" class="text">Frequency + active interval</text>

  <rect x="885" y="120" width="170" height="70" class="box" />
  <text x="970" y="148" text-anchor="middle" class="title">Soft Notch Filter</text>
  <text x="970" y="172" text-anchor="middle" class="text">Time-localized STFT mask</text>

  <rect x="1090" y="120" width="80" height="70" class="box" />
  <text x="1130" y="148" text-anchor="middle" class="title">Result</text>
  <text x="1130" y="172" text-anchor="middle" class="text">Cleaned audio</text>

  <path d="M180 155 L220 155" class="arrow" />
  <path d="M390 155 L430 155" class="arrow" />
  <path d="M600 70 L650 140" class="arrow" />
  <path d="M600 240 L650 170" class="arrow" />
  <path d="M840 155 L885 155" class="arrow" />
  <path d="M1055 155 L1090 155" class="arrow" />

  <path d="M515 105 L515 205" class="arrow" />
  <text x="622" y="28" class="text">Global frequency evidence</text>
  <text x="615" y="295" class="text">Time-frequency evidence</text>
</svg>
